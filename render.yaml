services:
  - type: web
    name: AstroHire-Portal
    env: node
    plan: free
    region: oregon
    buildCommand: "npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: ADZUNA_APP_ID
        value: "cb0cca60"
      - key: ADZUNA_APP_KEY
        value: "dcc7279638a2473e82b4312ddb0cf0a7"
    healthCheckPath: /api/health
